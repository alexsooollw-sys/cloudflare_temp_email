name: Deploy Mail Subsite

on:
  push:
    tags:
      - "*"
    paths:
      - frontend/packages/mail/**
      - frontend/packages/shared/**
  workflow_dispatch:
    inputs:
      project_name:
        description: 'Cloudflare Pages project name'
        required: false
        default: temp-email-mail
      api_base:
        description: 'Worker API base URL (the same one your admin uses)'
        required: false
        default: ''

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - uses: pnpm/action-setup@v5
        with:
          version: 10
          run_install: false

      - name: Build mail package
        run: |
          cd frontend/
          PROJECT_NAME="${{ github.event.inputs.project_name }}"
          PROJECT_NAME="${PROJECT_NAME:-temp-email-mail}"
          echo "PROJECT_NAME=$PROJECT_NAME" >> $GITHUB_ENV

          # API base: explicit input wins; otherwise reuse the existing FRONTEND env
          # if the operator's old admin .env.prod is exposed via FRONTEND_ENV secret.
          API_BASE="${{ github.event.inputs.api_base }}"
          if [ -z "$API_BASE" ] && [ -n "${{ secrets.FRONTEND_ENV }}" ]; then
            API_BASE=$(echo "${{ secrets.FRONTEND_ENV }}" | grep -E '^VITE_API_BASE=' | head -1 | cut -d= -f2- || true)
          fi
          echo "VITE_API_BASE=$API_BASE" > packages/mail/.env.production

          pnpm install --no-frozen-lockfile
          pnpm --filter @cte/mail run build

      - name: Deploy to Cloudflare Pages
        run: |
          cd frontend/packages/mail/
          pnpm exec wrangler pages deploy ./dist \
            --project-name="$PROJECT_NAME" \
            --branch production \
            --commit-dirty=true
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
